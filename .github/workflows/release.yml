# Release: testes + binário em tags v*
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o bin/goai ./cmd/goai

      - uses: actions/upload-artifact@v7
        with:
          name: goai-linux-amd64
          path: bin/goai
