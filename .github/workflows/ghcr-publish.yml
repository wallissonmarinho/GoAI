# Build e push da imagem Docker para GHCR (linux/amd64 + arm64), tag main + SHA.
# Na VM (compose gotv): docker compose pull goai — ver GoTV oracle-deploy.
name: ghcr-publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: goai-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  GOAI_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ env.GOAI_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
