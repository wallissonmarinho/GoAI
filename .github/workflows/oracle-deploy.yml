# Deploy na VM Oracle (Docker Compose) após push na branch principal.
#
# Job deploy: environment: prd → secrets/variables do ambiente **prd** (e Repository secrets OCI/GHCR)
# são passados por SSH e gravados em deploy/oracle/.env.goai.deploy na VM.
#
# Repository secrets: OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY; opcional GHCR_*
# Variable (recomendado) ou secret: OCI_DEPLOY_ROOT = pasta pai de deploy/oracle na VM (ex: /home/ubuntu/www)
#
# Environment **prd** — Secrets: GOAI_ADMIN_API_KEY (e opcional GOAI_GEMINI_API_KEYS se não usares Variable)
# Environment **prd** — Variables: GOAI_GEMINI_API_KEYS (CSV de chaves; menos privado que Secret), GOAI_GEMINI_MODEL (opcional)
#
# ACME / Caddy continuam no .env na VM (não são enviados por este workflow).
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goai-${{ github.ref }}
  cancel-in-progress: true

env:
  GOAI_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ env.GOAI_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoAI on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Path is not sensitive: prefer repo/env Variable OCI_DEPLOY_ROOT so logs show the real path. Fallback: secret (legacy).
          OCI_DEPLOY_ROOT: ${{ vars.OCI_DEPLOY_ROOT || secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOAI_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOAI_IMAGE_TAG: main
          GOAI_ADMIN_API_KEY: ${{ secrets.GOAI_ADMIN_API_KEY }}
          # Preferir Secret para chaves; Variable aceita CSV (vars não são mascaradas nos logs).
          GOAI_GEMINI_API_KEYS: ${{ vars.GOAI_GEMINI_API_KEYS || secrets.GOAI_GEMINI_API_KEYS }}
          GOAI_GEMINI_MODEL: ${{ vars.GOAI_GEMINI_MODEL }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          debug: true
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOAI_GHCR_OWNER,GOAI_IMAGE_TAG,GOAI_ADMIN_API_KEY,GOAI_GEMINI_API_KEYS,GOAI_GEMINI_MODEL
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOAI_GHCR_OWNER="${GOAI_GHCR_OWNER:-}"
            export GOAI_IMAGE_TAG="${GOAI_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            echo "goai deploy: effective ROOT=${ROOT} (set secret OCI_DEPLOY_ROOT if wrong)"
            echo "goai deploy: ORACLE_DIR=${ORACLE_DIR}"
            if [ -z "${GOAI_GHCR_OWNER}" ]; then
              echo "goai deploy: ERROR GOAI_GHCR_OWNER is empty on remote (check envs passed to ssh-action)" >&2
              exit 1
            fi
            if [ ! -d "${ORACLE_DIR}" ]; then
              echo "ERROR: ${ORACLE_DIR} does not exist." >&2
              echo "Create GitHub Actions secret OCI_DEPLOY_ROOT = parent of deploy/oracle (ex: /home/ubuntu/www)." >&2
              exit 1
            fi
            if [ ! -f "${ORACLE_DIR}/docker-compose.gotv.yml" ]; then
              echo "ERROR: missing ${ORACLE_DIR}/docker-compose.gotv.yml" >&2
              exit 1
            fi
            if [ ! -w "${ORACLE_DIR}" ]; then
              echo "ERROR: ${ORACLE_DIR} is not writable by $(whoami). Example fix: sudo chown -R $(whoami) \"${ORACLE_DIR}\"" >&2
              ls -ld "${ORACLE_DIR}" >&2 || true
              exit 1
            fi
            echo "goai deploy: path OK (exists, compose file, writable)"
            DEPLOY_ENV="${ORACLE_DIR}/.env.goai.deploy"
            umask 077
            rm -f "${DEPLOY_ENV}" || true
            : > "${DEPLOY_ENV}" || { echo "goai deploy: ERROR cannot create ${DEPLOY_ENV}" >&2; ls -la "${ORACLE_DIR}" >&2; exit 1; }
            echo "goai deploy: step=env-file-empty"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}" || {
                echo "goai deploy: ERROR printf failed for ${_k}" >&2
                exit 1
              }
            }
            write_kv GOAI_ADMIN_API_KEY "${GOAI_ADMIN_API_KEY:-}"
            write_kv GOAI_GEMINI_API_KEYS "${GOAI_GEMINI_API_KEYS:-}"
            write_kv GOAI_GEMINI_MODEL "${GOAI_GEMINI_MODEL:-}"
            echo "goai deploy: step=kvs-written"
            chmod 600 "${DEPLOY_ENV}" || true
            echo "goai deploy: step=chmod-done"
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              set +e
              set +o pipefail
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOAI_GHCR_OWNER}}" --password-stdin
              _login_rc=$?
              set -o pipefail
              set -e
              if [ "${_login_rc}" -ne 0 ]; then
                echo "goai deploy: WARN docker login ghcr.io failed (rc=${_login_rc}); continuing if image is public" >&2
              fi
            fi
            echo "goai deploy: step=docker-login-block-done"
            # VM must have docker-compose.gotv.yml with service "goai" (deploy/oracle no repo). Sem pull fica versão antiga → "no such service: goai".
            if [ -d "${ROOT}/.git" ]; then
              echo "goai deploy: updating ${ROOT} (git pull --ff-only)"
              git -C "${ROOT}" pull --ff-only
            else
              echo "goai deploy: ${ROOT} has no .git - sync deploy/oracle manually or clone repo at ROOT."
            fi
            echo "goai deploy: step=git-block-done"
            cd "${ORACLE_DIR}"
            echo "goai deploy: step=compose-pull"
            if docker compose -f docker-compose.gotv.yml pull goai; then
              echo "goai: image from GHCR"
            else
              echo "goai: pull failed, building from ../../GoAI"
              docker compose -f docker-compose.gotv.yml build goai
            fi
            echo "goai deploy: step=compose-up"
            docker compose -f docker-compose.gotv.yml up -d --force-recreate goai
            echo "goai deploy: done"
