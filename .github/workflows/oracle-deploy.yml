# Deploy na VM Oracle (Docker Compose) após push na branch principal.
#
# Job deploy: environment: prd → secrets/variables do ambiente **prd** (e Repository secrets OCI/GHCR)
# são passados por SSH e gravados em deploy/oracle/.env.goai.deploy na VM.
#
# Repository secrets: OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY; opcional OCI_DEPLOY_ROOT, GHCR_*
#
# Environment **prd** — Secrets: GOAI_ADMIN_API_KEY, GOAI_GEMINI_API_KEYS
# Environment **prd** — Variables: GOAI_GEMINI_MODEL (opcional)
#
# ACME / Caddy continuam no .env na VM (não são enviados por este workflow).
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goai-${{ github.ref }}
  cancel-in-progress: true

env:
  GOAI_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ env.GOAI_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoAI on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOAI_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOAI_IMAGE_TAG: main
          GOAI_ADMIN_API_KEY: ${{ secrets.GOAI_ADMIN_API_KEY }}
          GOAI_GEMINI_API_KEYS: ${{ secrets.GOAI_GEMINI_API_KEYS }}
          GOAI_GEMINI_MODEL: ${{ vars.GOAI_GEMINI_MODEL }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOAI_GHCR_OWNER,GOAI_IMAGE_TAG,GOAI_ADMIN_API_KEY,GOAI_GEMINI_API_KEYS,GOAI_GEMINI_MODEL
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOAI_GHCR_OWNER="${GOAI_GHCR_OWNER}"
            export GOAI_IMAGE_TAG="${GOAI_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.goai.deploy"
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOAI_ADMIN_API_KEY "${GOAI_ADMIN_API_KEY:-}"
            write_kv GOAI_GEMINI_API_KEYS "${GOAI_GEMINI_API_KEYS:-}"
            write_kv GOAI_GEMINI_MODEL "${GOAI_GEMINI_MODEL:-}"
            chmod 600 "${DEPLOY_ENV}" || true
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOAI_GHCR_OWNER}}" --password-stdin
            fi
            cd "${ORACLE_DIR}"
            if docker compose -f docker-compose.gotv.yml pull goai; then
              echo "goai: image from GHCR"
            else
              echo "goai: pull failed, building from ../../GoAI"
              docker compose -f docker-compose.gotv.yml build goai
            fi
            docker compose -f docker-compose.gotv.yml up -d --force-recreate goai
