# CI em branches de trabalho e PRs. Push em main/master NÃO dispara isto — o ghcr-publish já corre test+imagem.
name: ci

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches: [main, master]

concurrency:
  group: goai-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -trimpath -o /tmp/goai ./cmd/goai
