# golangci-lint v2 — alinhado ao GoAnimes (CI: golangci/golangci-lint-action@v8, version v2.11).
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
